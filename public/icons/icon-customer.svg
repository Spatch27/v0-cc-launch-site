<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <style>
    .line { stroke: #4a4a4a; stroke-width: 1; fill: none; }
    .dot-large { fill: #4a4a4a; }
    .dot-small { fill: #4a4a4a; }
    .circle-outline { stroke: #4a4a4a; stroke-width: 1; fill: none; }
  </style>
  <!-- Outer circle -->
  <circle cx="60" cy="60" r="40" class="circle-outline"/>
  <!-- Middle circle -->
  <circle cx="60" cy="60" r="22" class="circle-outline"/>
  <!-- Center dot (large, the bullseye focus) -->
  <circle cx="60" cy="60" r="5" class="dot-large"/>
  <!-- Orbital dots at cardinal points on outer circle -->
  <circle cx="60" cy="20" r="3" class="dot-small"/>
  <circle cx="60" cy="100" r="3" class="dot-small"/>
  <circle cx="20" cy="60" r="3" class="dot-small"/>
  <circle cx="100" cy="60" r="3" class="dot-small"/>
  <!-- Small circles around orbital dots -->
  <circle cx="60" cy="20" r="7" class="circle-outline"/>
  <circle cx="60" cy="100" r="7" class="circle-outline"/>
  <circle cx="20" cy="60" r="7" class="circle-outline"/>
  <circle cx="100" cy="60" r="7" class="circle-outline"/>
  <!-- Connecting lines from orbital dots to center -->
  <line x1="60" y1="27" x2="60" y2="38" class="line"/>
  <line x1="60" y1="82" x2="60" y2="93" class="line"/>
  <line x1="27" y1="60" x2="38" y2="60" class="line"/>
  <line x1="82" y1="60" x2="93" y2="60" class="line"/>
</svg>
