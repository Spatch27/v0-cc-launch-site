<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <style>
    .line { stroke: #4a4a4a; stroke-width: 1; fill: none; }
    .dot { fill: #4a4a4a; }
    .circle-outline { stroke: #4a4a4a; stroke-width: 1; fill: none; }
    .axis { stroke: #4a4a4a; stroke-width: 0.75; fill: none; opacity: 0.4; }
  </style>
  <!-- Axes -->
  <line x1="18" y1="100" x2="108" y2="100" class="axis"/>
  <line x1="18" y1="100" x2="18" y2="14" class="axis"/>
  <!-- Grid hints -->
  <line x1="18" y1="78" x2="108" y2="78" class="axis" stroke-dasharray="2,4"/>
  <line x1="18" y1="56" x2="108" y2="56" class="axis" stroke-dasharray="2,4"/>
  <line x1="18" y1="34" x2="108" y2="34" class="axis" stroke-dasharray="2,4"/>
  <!-- Connecting lines -->
  <line x1="30" y1="85" x2="50" y2="72" class="line"/>
  <line x1="50" y1="72" x2="68" y2="78" class="line"/>
  <line x1="68" y1="78" x2="82" y2="45" class="line"/>
  <line x1="82" y1="45" x2="100" y2="25" class="line"/>
  <!-- Data point 1 -->
  <circle cx="30" cy="85" r="3" class="dot"/>
  <circle cx="30" cy="85" r="7" class="circle-outline"/>
  <!-- Data point 2 -->
  <circle cx="50" cy="72" r="3" class="dot"/>
  <circle cx="50" cy="72" r="7" class="circle-outline"/>
  <!-- Data point 3 -->
  <circle cx="68" cy="78" r="3" class="dot"/>
  <circle cx="68" cy="78" r="7" class="circle-outline"/>
  <!-- Data point 4 -->
  <circle cx="82" cy="45" r="3" class="dot"/>
  <circle cx="82" cy="45" r="7" class="circle-outline"/>
  <!-- Data point 5 -->
  <circle cx="100" cy="25" r="4" class="dot"/>
  <circle cx="100" cy="25" r="8" class="circle-outline"/>
</svg>
