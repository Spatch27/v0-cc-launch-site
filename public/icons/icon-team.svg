<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <style>
    .line { stroke: #ffffff; stroke-width: 1; fill: none; }
    .dot { fill: #ffffff; }
    .circle-outline { stroke: #ffffff; stroke-width: 1; fill: none; }
  </style>
  <!-- Equilateral triangle centred in viewbox -->
  <!-- Side length 80, height = 69.28 -->
  <!-- Centroid Y = top + 2/3 * height -->
  <!-- Top: (60, 21.81), BL: (20, 91.09), BR: (100, 91.09), Centroid: (60, 68) -->
  
  <!-- Outer triangle -->
  <line x1="60" y1="22" x2="20" y2="91" class="line"/>
  <line x1="20" y1="91" x2="100" y2="91" class="line"/>
  <line x1="100" y1="91" x2="60" y2="22" class="line"/>
  <!-- Inner triangle scaled 0.4 from centroid (60, 68) -->
  <!-- Inner top: 60, 68 + 0.4*(22-68) = 60, 49.6 -->
  <!-- Inner BL: 60 + 0.4*(20-60), 68 + 0.4*(91-68) = 44, 77.2 -->
  <!-- Inner BR: 60 + 0.4*(100-60), 68 + 0.4*(91-68) = 76, 77.2 -->
  <line x1="60" y1="49.6" x2="44" y2="77.2" class="line"/>
  <line x1="44" y1="77.2" x2="76" y2="77.2" class="line"/>
  <line x1="76" y1="77.2" x2="60" y2="49.6" class="line"/>
  <!-- Top vertex -->
  <circle cx="60" cy="22" r="3.5" class="dot"/>
  <circle cx="60" cy="22" r="8" class="circle-outline"/>
  <!-- Bottom left vertex -->
  <circle cx="20" cy="91" r="3.5" class="dot"/>
  <circle cx="20" cy="91" r="8" class="circle-outline"/>
  <!-- Bottom right vertex -->
  <circle cx="100" cy="91" r="3.5" class="dot"/>
  <circle cx="100" cy="91" r="8" class="circle-outline"/>
  <!-- Centre dot at true centroid -->
  <circle cx="60" cy="68" r="2.5" class="dot"/>
  <circle cx="60" cy="68" r="6" class="circle-outline"/>
</svg>
